name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --ignore-scripts

      - name: Typecheck
        run: npx astro check

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx astro build

      - name: Verify deploy secrets are present
        if: github.ref == 'refs/heads/main'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_RECIPIENTS: ${{ secrets.RESEND_RECIPIENTS }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::GitHub repo secret RESEND_API_KEY is empty" >&2
            exit 1
          fi
          if [ -z "$RESEND_RECIPIENTS" ]; then
            echo "::error::GitHub repo secret RESEND_RECIPIENTS is empty — inquiry emails would silently drop" >&2
            exit 1
          fi

      - name: Set Worker secrets
        if: github.ref == 'refs/heads/main'
        run: |
          printf '%s' "$RESEND_API_KEY" | npx --yes wrangler secret put RESEND_API_KEY
          printf '%s' "$RESEND_RECIPIENTS" | npx --yes wrangler secret put RESEND_RECIPIENTS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_RECIPIENTS: ${{ secrets.RESEND_RECIPIENTS }}

      - name: Deploy to Cloudflare
        if: github.ref == 'refs/heads/main'
        run: npx --yes wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
